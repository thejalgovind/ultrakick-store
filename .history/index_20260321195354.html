<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ULTRAKICK — Ultimate Football Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root { --primary: #ccff00; --dark-bg: #0a0a0a; --card-bg: #161616; --text-white: #ffffff; --text-gray: #a0a0a0; --font-heading: 'Bebas Neue', sans-serif; --font-body: 'Barlow', sans-serif; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: var(--dark-bg); color: var(--text-white); font-family: var(--font-body); }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
    .logo { font-family: var(--font-heading); font-size: 2rem; text-decoration: none; color: #fff; }
    .logo span { color: var(--primary); }
    .nav-cart-btn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 8px 15px; cursor: pointer; border-radius: 4px; }
    .hero { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.8), #0a0a0a), url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80&w=2000') center/cover; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 50px 5%; }
    .product-card { background: var(--card-bg); padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #222; }
    .product-card img { width: 100%; height: 180px; object-fit: contain; }
    .add-btn { width: 100%; background: var(--primary); color: #000; border: none; padding: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    #cartSidebar { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: #111; z-index: 2000; transition: 0.4s; padding: 20px; border-left: 2px solid var(--primary); display: flex; flex-direction: column; }
    #cartSidebar.active { right: 0; }
    #cartItems { flex-grow: 1; overflow-y: auto; margin-top: 20px; }
    .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
    .modal-content { background: var(--card-bg); margin: 5% auto; padding: 30px; width: 90%; max-width: 450px; border: 1px solid var(--primary); }
    input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #333; color: #fff; }
    footer { background: #050505; padding: 40px 5%; border-top: 1px solid #222; margin-top: 50px; }
    .skills-list { display: flex; flex-wrap: wrap; gap: 8px; list-style: none; margin-top: 10px; }
    .skills-list li { background: #222; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="logo">⚽ ULTRA<span>KICK</span></a>
    <button class="nav-cart-btn" onclick="toggleCart()">BAG <span id="cartCount">0</span></button>
  </nav>

  <section class="hero"><h1>ELITE <span>STORE</span></h1></section>

  <div class="grid" id="productGrid"></div>

  <div id="cartSidebar">
    <h2 style="font-family: var(--font-heading);">CART</h2>
    <div id="cartItems"></div>
    <div style="border-top: 1px solid #333; padding-top: 15px;">
      <h3>Total: ₹<span id="cartTotal">0</span></h3>
      <button class="add-btn" style="padding:15px;" onclick="openCheckout()">CHECKOUT</button>
      <button onclick="toggleCart()" style="width:100%; background:none; color:#777; border:none; margin-top:10px; cursor:pointer;">Close</button>
    </div>
  </div>

  <div id="checkoutModal" class="modal">
    <div class="modal-content">
      <h2 style="font-family: var(--font-heading);">SIGN IN & ORDER</h2>
      <form onsubmit="handleCheckout(event)">
        <input type="text" placeholder="Full Name" required id="formName">
        <input type="email" placeholder="Email" required id="formEmail">
        <input type="password" placeholder="Password" required id="formPass">
        <textarea placeholder="Address" required id="formAddress"></textarea>
        <button type="submit" class="add-btn">CONFIRM ORDER</button>
        <button type="button" onclick="closeCheckout()" style="width:100%; background:none; color:#777; border:none; margin-top:10px;">Cancel</button>
      </form>
    </div>
  </div>

  <footer>
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px;">
      <div>
        <h4 style="color:var(--primary)">DEV: THEJAL GOVIND</h4>
        <p style="font-size:0.8rem; color:var(--text-gray)">Full-stack college project built for the beautiful game.</p>
        <a href="https://www.linkedin.com/in/thejal-govind-5b1b46321/" target="_blank" style="color:var(--primary); text-decoration:none; font-size:0.8rem;"><i class="fab fa-linkedin"></i> LinkedIn</a>
      </div>
      <div>
        <h4 style="color:var(--primary)">SKILLS</h4>
        <ul class="skills-list"><li>HTML/CSS</li><li>JS</li><li>C</li><li>MySQL</li><li>MongoDB</li><li>R</li></ul>
      </div>
    </div>
  </footer>

  <script>
    let products = [];
    let cart = JSON.parse(localStorage.getItem('uk_cart')) || [];

    async function loadProducts() {
      try {
        const res = await fetch('http://localhost:5000/api/products');
        products = await res.json();
        const grid = document.getElementById('productGrid');
        grid.innerHTML = products.map(p => `
          <div class="product-card">
            <img src="${p.img_url}">
            <h4>${p.name}</h4>
            <p style="color:var(--primary)">₹${p.price}</p>
            <button class="add-btn" onclick="addToCart(${p.id})">ADD TO BAG</button>
          </div>
        `).join('');
      } catch (e) { document.getElementById('productGrid').innerHTML = "Run 'npm run server' to load products!"; }
    }

    function addToCart(id) {
      const p = products.find(x => x.id === id);
      const item = cart.find(x => x.id === id);
      if (item) item.qty++; else cart.push({...p, qty: 1});
      updateCart();
    }

    function updateCart() {
      localStorage.setItem('uk_cart', JSON.stringify(cart));
      document.getElementById('cartCount').innerText = cart.reduce((s, i) => s + i.qty, 0);
      document.getElementById('cartItems').innerHTML = cart.map((i, idx) => `
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
          <span>${i.name} (x${i.qty})</span>
          <i class="fas fa-trash" onclick="cart.splice(${idx},1);updateCart();" style="color:red; cursor:pointer;"></i>
        </div>`).join('');
      document.getElementById('cartTotal').innerText = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    }

    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }
    function openCheckout() { if(cart.length) document.getElementById('checkoutModal').style.display='block'; }
    function closeCheckout() { document.getElementById('checkoutModal').style.display='none'; }

    async function handleCheckout(e) {
      e.preventDefault();
      const body = {
        name: document.getElementById('formName').value,
        email: document.getElementById('formEmail').value,
        password: document.getElementById('formPass').value,
        address: document.getElementById('formAddress').value,
        total: document.getElementById('cartTotal').innerText
      };
      const res = await fetch('http://localhost:5000/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) { alert("Order Placed & Account Created!"); cart=[]; updateCart(); closeCheckout(); toggleCart(); }
    }

    loadProducts(); updateCart();
  </script>
</body>
</html>
