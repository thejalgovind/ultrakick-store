<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ULTRAKICK — Ultimate Football Store</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    /* ══════════════ CSS VARIABLES ══════════════ */
    :root {
      --primary: #ccff00;
      --dark-bg: #0a0a0a;
      --card-bg: #161616;
      --text-white: #ffffff;
      --text-gray: #a0a0a0;
      --font-heading: 'Bebas Neue', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    /* ══════════════ GLOBAL STYLES ══════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background-color: var(--dark-bg); color: var(--text-white); font-family: var(--font-body); overflow-x: hidden; }

    /* ══════════════ NAVIGATION ══════════════ */
    nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(10, 10, 10, 0.95); border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
    .logo { font-family: var(--font-heading); font-size: 1.8rem; text-decoration: none; color: var(--text-white); letter-spacing: 1px; }
    .logo span { color: var(--primary); }
    .nav-links { display: flex; gap: 30px; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--text-white); font-weight: 600; text-transform: uppercase; font-size: 0.9rem; transition: 0.3s; }
    .nav-links a:hover { color: var(--primary); }

    /* ══════════════ HERO SECTION ══════════════ */
    .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(to bottom, rgba(0,0,0,0.7), var(--dark-bg)), url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80&w=2000') center/cover; }
    .hero-title { font-family: var(--font-heading); font-size: clamp(3rem, 8vw, 6rem); line-height: 0.9; margin-bottom: 20px; }
    .hero-title span { color: var(--primary); }
    .btn-primary { background: var(--primary); color: #000; padding: 15px 40px; text-decoration: none; font-weight: 900; font-family: var(--font-heading); font-size: 1.2rem; border-radius: 4px; border: none; cursor: pointer; }

    /* ══════════════ CHECKOUT MODAL ══════════════ */
    .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
    .modal-content { background: var(--card-bg); margin: 5% auto; padding: 40px; border: 1px solid var(--primary); width: 90%; max-width: 500px; border-radius: 8px; position: relative; }
    .close-btn { position: absolute; right: 20px; top: 10px; font-size: 2rem; color: var(--text-gray); cursor: pointer; }
    .modal h2 { font-family: var(--font-heading); font-size: 2.5rem; margin-bottom: 20px; color: var(--primary); }
    .input-group { margin-bottom: 15px; text-align: left; }
    .input-group label { display: block; margin-bottom: 5px; color: var(--text-gray); font-size: 0.9rem; }
    .input-group input, .input-group textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #333; color: white; border-radius: 4px; font-family: var(--font-body); }
    .confirm-btn { width: 100%; background: var(--primary); color: #000; padding: 15px; border: none; font-weight: 700; cursor: pointer; border-radius: 4px; margin-top: 10px; text-transform: uppercase; }

    footer { padding: 40px 5%; text-align: center; border-top: 1px solid #222; color: var(--text-gray); margin-top: 50px; }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="logo">⚽ ULTRA<span>KICK</span></a>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="javascript:void(0)" onclick="openCheckout()">Checkout Test</a></li>
    </ul>
  </nav>

  <section class="hero" id="home">
    <h1 class="hero-title">READY TO<br><span>ORDER?</span></h1>
    <button class="btn-primary" onclick="openCheckout()">PROCEED TO CHECKOUT</button>
  </section>

  <div id="checkoutModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeCheckout()">&times;</span>
      <h2>FINALIZE ORDER ⚽</h2>
      <form id="checkoutForm" onsubmit="processOrder(event)">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="custName" required placeholder="Thejal Govind">
        </div>
        <div class="input-group">
          <label>Shipping Address</label>
          <textarea id="custAddress" required placeholder="Enter full address" rows="3"></textarea>
        </div>
        <div class="input-group">
          <label>Phone Number</label>
          <input type="tel" id="custPhone" required placeholder="+91 00000 00000">
        </div>
        <button type="submit" class="confirm-btn">Place Order (Cash on Delivery)</button>
      </form>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 <span>ULTRAKICK</span>. All Rights Reserved.</p>
  </footer>

  <script>
    function openCheckout() {
      document.getElementById('checkoutModal').style.display = 'block';
    }

    function closeCheckout() {
      document.getElementById('checkoutModal').style.display = 'none';
    }

    // Close modal if user clicks outside of it
    window.onclick = function(event) {
      const modal = document.getElementById('checkoutModal');
      if (event.target == modal) {
        closeCheckout();
      }
    }

    function processOrder(event) {
      event.preventDefault();
      const name = document.getElementById('custName').value;
      alert("Thanks " + name + "! Your order has been placed successfully.");
      closeCheckout();
    }
  </script>

</body>
</html>
