<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ULTRAKICK — Ultimate Football Store</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    /* ══════════════ CSS VARIABLES ══════════════ */
    :root {
      --primary: #ccff00; /* Neon Lime */
      --dark-bg: #0a0a0a;
      --card-bg: #161616;
      --text-white: #ffffff;
      --text-gray: #a0a0a0;
      --font-heading: 'Bebas Neue', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    /* ══════════════ GLOBAL STYLES ══════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
      background-color: var(--dark-bg); 
      color: var(--text-white); 
      font-family: var(--font-body); 
      overflow-x: hidden;
    }

    /* ══════════════ NAVIGATION ══════════════ */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5%;
      background: rgba(10, 10, 10, 0.95);
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .logo {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      text-decoration: none;
      color: var(--text-white);
      letter-spacing: 1px;
    }
    .logo span { color: var(--primary); }
    .nav-links { display: flex; gap: 30px; list-style: none; }
    .nav-links a {
      text-decoration: none;
      color: var(--text-white);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.9rem;
      transition: 0.3s;
    }
    .nav-links a:hover { color: var(--primary); }

    /* ══════════════ HERO SECTION ══════════════ */
    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), var(--dark-bg)),
                  url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80&w=2000') center/cover;
    }
    .hero-eyebrow { color: var(--primary); font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; }
    .hero-title {
      font-family: var(--font-heading);
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 0.9;
      margin-bottom: 20px;
    }
    .hero-title span { color: var(--primary); }
    .btn-primary {
      background: var(--primary);
      color: #000;
      padding: 15px 40px;
      text-decoration: none;
      font-weight: 900;
      font-family: var(--font-heading);
      font-size: 1.2rem;
      border-radius: 4px;
      transition: 0.3s transform;
    }
    .btn-primary:hover { transform: scale(1.05); }

    /* ══════════════ CATEGORIES ══════════════ */
    .section-pad { padding: 80px 5%; }
    .section-title { font-family: var(--font-heading); font-size: 3rem; margin-bottom: 40px; text-align: center; }
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .cat-card {
      background: var(--card-bg);
      padding: 40px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #222;
      transition: 0.3s;
      cursor: pointer;
    }
    .cat-card:hover { border-color: var(--primary); transform: translateY(-5px); }
    .cat-card i { font-size: 3rem; color: var(--primary); margin-bottom: 20px; }
    .cat-card h3 { font-family: var(--font-heading); font-size: 1.5rem; }

    /* ══════════════ FOOTER ══════════════ */
    footer { padding: 40px 5%; text-align: center; border-top: 1px solid #222; color: var(--text-gray); }
    footer span { color: var(--primary); }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="logo">⚽ ULTRA<span>KICK</span></a>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#categories">Shop</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section class="hero" id="home">
    <div class="hero-eyebrow">2026 COLLECTION LIVE</div>
    <h1 class="hero-title">GEAR UP FOR THE<br><span>BEAUTIFUL GAME</span></h1>
    <a href="#categories" class="btn-primary">EXPLORE STORE</a>
  </section>

  <section class="section-pad" id="categories">
    <h2 class="section-title">Shop by Category</h2>
    <div class="cat-grid">
      <div class="cat-card">
        <i class="fas fa-tshirt"></i>
        <h3>JERSEYS</h3>
      </div>
      <div class="cat-card">
        <i class="fas fa-shoe-prints"></i>
        <h3>BOOTS</h3>
      </div>
      <div class="cat-card">
        <i class="fas fa-futbol"></i>
        <h3>EQUIPMENT</h3>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 <span>ULTRAKICK</span>. All Rights Reserved.</p>
  </footer>

  <script>
    // Smooth check for connectivity
    console.log("ULTRAKICK: Frontend Loaded Successfully.");
    
    // Simple click handler for category cards
    document.querySelectorAll('.cat-card').forEach(card => {
      card.addEventListener('click', () => {
        const category = card.querySelector('h3').innerText;
        alert("Redirecting to " + category + " section...");
      });
    });
  </script>

</body>
</html>
