<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ULTRAKICK — Ultimate Football Store</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --primary: #ccff00;
      --dark-bg: #0a0a0a;
      --card-bg: #161616;
      --text-white: #ffffff;
      --text-gray: #a0a0a0;
      --font-heading: 'Bebas Neue', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background-color: var(--dark-bg); color: var(--text-white); font-family: var(--font-body); overflow-x: hidden; }

    nav { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 15px 5%; background: rgba(10, 10, 10, 0.98); 
      border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; 
    }
    .logo { font-family: var(--font-heading); font-size: 2rem; text-decoration: none; color: #fff; }
    .logo span { color: var(--primary); }
    
    .nav-cart-btn { 
      background: none; border: 1px solid var(--primary); color: var(--primary); 
      padding: 8px 15px; cursor: pointer; font-family: var(--font-heading); 
      font-size: 1.1rem; border-radius: 4px; display: flex; align-items: center; gap: 8px;
    }
    .cart-badge { background: #fff; color: #000; padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

    .hero { 
      height: 50vh; display: flex; flex-direction: column; justify-content: center; 
      align-items: center; text-align: center; 
      background: linear-gradient(rgba(0,0,0,0.7), var(--dark-bg)), url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80&w=2000') center/cover;
    }
    .hero h1 { font-family: var(--font-heading); font-size: 5rem; line-height: 0.9; }
    .hero h1 span { color: var(--primary); }

    .section-pad { padding: 60px 5%; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
    .product-card { background: var(--card-bg); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #222; transition: 0.3s; }
    .product-card:hover { border-color: var(--primary); transform: translateY(-5px); }
    .product-card img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; }
    .product-card h3 { font-family: var(--font-heading); font-size: 1.5rem; margin-bottom: 5px; }
    .product-card .price { color: var(--primary); font-weight: 700; font-size: 1.2rem; margin-bottom: 15px; }
    .add-btn { width: 100%; background: var(--primary); color: #000; border: none; padding: 12px; font-weight: 700; cursor: pointer; border-radius: 6px; }

    #cartSidebar {
      position: fixed; right: -400px; top: 0; width: 380px; height: 100%;
      background: #0f0f0f; z-index: 2000; transition: 0.4s; padding: 30px;
      border-left: 2px solid var(--primary); display: flex; flex-direction: column;
    }
    #cartSidebar.active { right: 0; }
    #cartItems { flex-grow: 1; overflow-y: auto; margin-top: 20px; padding-right: 10px; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
    .checkout-btn { background: var(--primary); color: #000; width: 100%; padding: 15px; border: none; font-weight: 900; cursor: pointer; margin-top: 20px; text-transform: uppercase; font-family: var(--font-heading); font-size: 1.2rem; }

    .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
    .modal-content { background: var(--card-bg); margin: 2% auto; padding: 40px; width: 90%; max-width: 500px; border: 1px solid var(--primary); border-radius: 8px; }
    .input-group { margin-bottom: 15px; }
    input, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #333; color: #fff; border-radius: 4px; }

    footer { background: #050505; padding: 60px 5%; border-top: 1px solid #222; margin-top: 50px; }
    .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
    #toast { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: #000; padding: 15px 25px; border-radius: 5px; font-weight: 700; display: none; z-index: 4000; }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="logo">⚽ ULTRA<span>KICK</span></a>
    <button class="nav-cart-btn" onclick="toggleCart()">
      <i class="fas fa-shopping-bag"></i> <span class="cart-badge" id="cartCount">0</span>
    </button>
  </nav>

  <section class="hero">
    <h1>ULTRA<span>KICK</span> STORE</h1>
    <p style="color:var(--text-gray); margin-top:10px;">Premium Football Gear</p>
  </section>

  <section class="section-pad">
    <h2 style="font-family: var(--font-heading); font-size: 2.5rem; margin-bottom: 30px;">Current Collection</h2>
    <div class="grid" id="productGrid">
      <p style="color: var(--text-gray);">Syncing with TiDB Backend...</p>
    </div>
  </section>

  <div id="cartSidebar">
    <h2 style="font-family: var(--font-heading); font-size: 2rem;">YOUR BAG</h2>
    <div id="cartItems"></div>
    <div style="padding-top: 20px; border-top: 1px solid #333;">
      <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2rem;">
        <span>Total:</span>
        <span>₹<span id="cartTotal">0</span></span>
      </div>
      <button class="checkout-btn" onclick="openCheckout()">PROCEED TO CHECKOUT</button>
      <button onclick="toggleCart()" style="background:none; color:var(--text-gray); width:100%; border:none; margin-top:15px; cursor:pointer;">Continue Shopping</button>
    </div>
  </div>

  <div id="checkoutModal" class="modal">
    <div class="modal-content">
      <h2 style="font-family: var(--font-heading); color: var(--primary); font-size: 2.5rem;">CHECKOUT</h2>
      <form onsubmit="placeOrder(event)">
        <div class="input-group"><label>FULL NAME</label><input type="text" id="formName" required></div>
        <div class="input-group"><label>EMAIL</label><input type="email" id="formEmail" required></div>
        <div class="input-group"><label>PASSWORD</label><input type="password" id="formPass" required></div>
        <div class="input-group"><label>ADDRESS</label><textarea id="formAddress" required rows="2"></textarea></div>
        <button type="submit" class="checkout-btn">PLACE ORDER (COD)</button>
        <button type="button" onclick="closeCheckout()" style="background:none; color:var(--text-gray); width:100%; border:none; margin-top:10px;">Back</button>
      </form>
    </div>
  </div>

  <footer>
    <div class="footer-grid">
      <div class="footer-section"><h3>DEVELOPER</h3><p>Thejal Govind</p></div>
    </div>
  </footer>

  <div id="toast">Added to bag!</div>

  <script>
    const API_URL = "http://localhost:5000/api";
    let products = [];
    let cart = JSON.parse(localStorage.getItem('ultrakick_cart')) || [];

    async function fetchProducts() {
      try {
        const response = await fetch(`${API_URL}/products`);
        products = await response.json();
        renderProducts();
      } catch (err) {
        console.error("Fetch error:", err);
      }
    }

    function renderProducts() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <img src="${p.img_url}" alt="${p.name}">
          <h3>${p.name}</h3>
          <p class="price">₹${p.price}</p>
          <button class="add-btn" onclick="addToCart(${p.id})">ADD TO BAG</button>
        </div>
      `).join('');
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      const existingItem = cart.find(item => item.id === id);
      existingItem ? existingItem.quantity++ : cart.push({ ...product, quantity: 1 });
      updateCart();
      showToast();
    }

    function updateCart() {
      localStorage.setItem('ultrakick_cart', JSON.stringify(cart));
      document.getElementById('cartCount').innerText = cart.reduce((sum, i) => sum + i.quantity, 0);
      document.getElementById('cartItems').innerHTML = cart.map((item, idx) => `
        <div class="cart-item">
          <div><h4>${item.name}</h4><span>₹${item.price} x ${item.quantity}</span></div>
          <i class="fas fa-times" onclick="removeItem(${idx})" style="cursor:pointer;color:red"></i>
        </div>
      `).join('') || '<p style="text-align:center;margin-top:20px">Empty</p>';
      document.getElementById('cartTotal').innerText = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
    }

    function removeItem(idx) { cart.splice(idx, 1); updateCart(); }
    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }
    function openCheckout() { if(cart.length) document.getElementById('checkoutModal').style.display='block'; }
    function closeCheckout() { document.getElementById('checkoutModal').style.display='none'; }
    function showToast() { const t = document.getElementById('toast'); t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

    async function placeOrder(e) {
      e.preventDefault();
      const body = {
        name: document.getElementById('formName').value,
        email: document.getElementById('formEmail').value,
        password: document.getElementById('formPass').value,
        address: document.getElementById('formAddress').value,
        total: document.getElementById('cartTotal').innerText.replace(/[₹,]/g, '').trim()
      };

      try {
        const response = await fetch(`${API_URL}/checkout`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const result = await response.json();
        if (response.ok) {
          alert(`SUCCESS! Order #${result.orderId} Placed.`);
          cart = []; updateCart(); closeCheckout(); toggleCart();
        } else {
          alert("Error: " + result.error);
        }
      } catch (err) {
        alert("Server is offline.");
      }
    }

    fetchProducts();
    updateCart();
  </script>
</body>
</html>
